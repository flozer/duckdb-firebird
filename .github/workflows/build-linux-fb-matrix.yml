name: Build + Test Linux x64 (FB 3/4/5 matrix)

# Builds the extension once and runs the SQL test suites against three
# Firebird major versions (3, 4, 5) sequentially on a single Ubuntu 24.04
# runner. The FB server is started in a Docker container, port-mapped to
# localhost:3050. The client library used to talk to it is extracted from
# that SAME container image (see "Extract matching libfbclient" below) —
# earlier versions of this workflow used the runner's system-wide
# libfbclient.so.2 (installed once via apt, always Firebird 3.0 on Ubuntu
# noble) for all three matrix legs, which meant fb4/fb5 ran an FB3 client
# against an FB4/FB5 server: a real client/server wire-protocol mismatch,
# not a version the client and server ever agree to negotiate down to.
# That surfaced as "sqlcode -204 Data type unknown" preparing a query
# against a self-join/aggregate view (see issue #40) — nothing to do with
# extension code, purely this workflow using one fixed client library for
# every server version.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DUCKDB_VERSION: v1.5.3

jobs:
  build-test:
    name: linux-x64 / fb${{ matrix.fb_major }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - fb_major: 3
            fb_image: firebirdsql/firebird:3-noble
          - fb_major: 4
            fb_image: firebirdsql/firebird:4-noble
          - fb_major: 5
            fb_image: firebirdsql/firebird:5-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Guard against inline fixture DDL drift (#39)
        run: bash scripts/check_no_inline_fixture_drift.sh

      - name: Install build deps + firebird client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config python3 ccache \
            firebird-dev

      - name: Configure ccache
        run: |
          ccache --max-size=1G
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-linux-fb${{ matrix.fb_major }}-${{ env.DUCKDB_VERSION }}-${{ github.sha }}
          restore-keys: ccache-linux-fb${{ matrix.fb_major }}-${{ env.DUCKDB_VERSION }}-

      - name: Start Firebird ${{ matrix.fb_major }} container
        run: |
          docker run -d \
              --name fb \
              -p 3050:3050 \
              -e FIREBIRD_ROOT_PASSWORD=masterkey \
              -e FIREBIRD_USE_LEGACY_AUTH=true \
              ${{ matrix.fb_image }}
          # Wait for the server to accept connections.
          for i in $(seq 1 30); do
            if nc -z localhost 3050; then echo "FB up"; break; fi
            sleep 1
          done
          docker logs fb | tail -20

      - name: Provision FB${{ matrix.fb_major }} fixtures
        run: |
          # Apply the EMPLOYEE fixture via isql inside the container —
          # the container has the matching server-side libfbclient and
          # the database file path is server-local.
          docker exec -i fb bash -c "isql -u SYSDBA -p masterkey" <<'SQL'
          CREATE DATABASE '/var/lib/firebird/data/test.fdb' DEFAULT CHARACTER SET UTF8;
          SQL
          docker cp scripts/fixture_common.sql fb:/tmp/fixture_common.sql
          docker exec fb isql -u SYSDBA -p masterkey -i /tmp/fixture_common.sql /var/lib/firebird/data/test.fdb

          if [ "${{ matrix.fb_major }}" != "3" ]; then
            docker cp scripts/fixture_biz4.sql fb:/tmp/fixture_biz4.sql
            printf "%s\n" "CREATE DATABASE '/var/lib/firebird/data/biz4.fdb' DEFAULT CHARACTER SET UTF8;" \
              | docker exec -i fb bash -c "isql -u SYSDBA -p masterkey"
            docker exec fb isql -u SYSDBA -p masterkey -i /tmp/fixture_biz4.sql /var/lib/firebird/data/biz4.fdb
          fi

          # Suite tests connect over TCP — expose the URL form.
          echo "FIREBIRD_TEST_DB=firebird://SYSDBA:masterkey@localhost:3050/var/lib/firebird/data/test.fdb?charset=UTF8" >> $GITHUB_ENV

      - name: Extract matching libfbclient from the fb${{ matrix.fb_major }} container
        run: |
          # The extension loads libfbclient.so.2 at runtime via dlopen
          # (src/firebird_client_loader.cpp) rather than linking it at
          # build time, so whatever copy is on the runner's library search
          # path is what actually talks wire protocol to the server. Pull
          # the client lib straight out of THIS job's own container image
          # so it's always version-matched to the server it's about to
          # talk to, instead of relying on the runner's single system-wide
          # apt-installed copy (always FB3.0 on Ubuntu noble).
          # SONAME convention differs by major version -- FB 2.5/3.0 use
          # libfbclient.so.2, FB4+ bumped it to match the major version
          # (libfbclient.so.4, .so.5) after an ABI break, so the pattern
          # has to stay broad ("libfbclient.so*") rather than hardcoding
          # ".2". A first attempt at this fix found the right file this
          # way but still failed to dlopen() on fb3/fb4 -- both of those
          # images keep libfbclient in a self-contained directory
          # (/opt/firebird/lib, /usr/lib64) alongside its own private
          # copies of transitive dependencies (crypto/ICU/etc). Copying
          # only the one .so file stranded those siblings inside the
          # container, so the runner's dynamic linker couldn't resolve
          # them. fb5 happened to live under the Ubuntu multiarch path
          # (/usr/lib/x86_64-linux-gnu) where its deps were already
          # satisfied by packages apt had already installed on the
          # runner, which is why only fb3/fb4 hit this.
          LIB_IN_CONTAINER=$(docker exec fb sh -c "find / -xdev -name 'libfbclient.so*' 2>/dev/null | head -1")
          if [ -z "$LIB_IN_CONTAINER" ]; then
            echo "::error::could not locate libfbclient.so* inside the fb${{ matrix.fb_major }} container"
            exit 1
          fi
          echo "found $LIB_IN_CONTAINER in container"
          # Copy the lib itself plus whatever *specific* shared-library
          # dependencies ldd resolves for it inside the container -- not
          # the whole containing directory, which for fb5 is the shared
          # Ubuntu multiarch path (/usr/lib/x86_64-linux-gnu) holding
          # thousands of unrelated system libraries. ldd's "=> /path"
          # lines give exactly the resolved deps that matter; anything
          # ldd resolves via the runner's own ld.so cache (libc, libm,
          # etc., already present) is harmless to copy too, just extra
          # bytes, not extra risk.
          LOCAL_DIR="$PWD/fbclient-fb${{ matrix.fb_major }}"
          mkdir -p "$LOCAL_DIR"
          # Exclude core glibc-family libs (libc/libpthread/libm/libdl/
          # librt/ld-linux) from the copy: those must always come from the
          # runner's own base system. Preferring a container-side copy of
          # THOSE via LD_LIBRARY_PATH risks a glibc ABI mismatch across the
          # whole process, not just Firebird calls -- strictly worse than
          # the bug this step exists to fix. Everything else Firebird-
          # specific (ICU, crypto/decNumber, etc.) is safe and necessary
          # to copy alongside it.
          docker exec fb sh -c "ldd '$LIB_IN_CONTAINER'" \
            | grep -oE '/[^ ]+' | sort -u \
            | grep -vE '/(libc|libpthread|libm|libdl|librt|ld-linux)[.-]' \
            | while read -r dep; do
                docker cp -L "fb:$dep" "$LOCAL_DIR/$(basename "$dep")" 2>/dev/null || true
              done
          docker cp -L "fb:$LIB_IN_CONTAINER" "$LOCAL_DIR/$(basename "$LIB_IN_CONTAINER")"
          LOCAL_LIB="$LOCAL_DIR/$(basename "$LIB_IN_CONTAINER")"
          file "$LOCAL_LIB"
          echo "LD_LIBRARY_PATH=$LOCAL_DIR:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "DUCKDB_FIREBIRD_CLIENT_LIBRARY=$LOCAL_LIB" >> $GITHUB_ENV

      - name: Build and run mkblob_fixture (issue #35 / #39)
        run: |
          # mkblob_fixture.cpp writes TBLOB_MULTISEG's genuinely
          # multi-segment BLOB content via real isc_put_segment calls --
          # a plain SQL literal can't do this (see the file's own header
          # comment), so it can't be folded into fixture_common.sql. The
          # firebirdsql/firebird:*-noble images have no C++ toolchain, so
          # this compiles on the runner instead, linking against the
          # SAME version-matched libfbclient the previous step already
          # extracted from this job's own container -- never the
          # apt-installed firebird-dev package's generic -lfbclient,
          # which would silently relink against a mismatched client
          # version and reintroduce the exact bug PR #41 fixed.
          LOCAL_LIB="$DUCKDB_FIREBIRD_CLIENT_LIBRARY"
          LOCAL_DIR="$(dirname "$LOCAL_LIB")"
          g++ -std=c++17 -I/usr/include/firebird \
              -o mkblob_fixture scripts/mkblob_fixture.cpp \
              -L"$LOCAL_DIR" -l:"$(basename "$LOCAL_LIB")"
          ./mkblob_fixture localhost/3050:/var/lib/firebird/data/test.fdb SYSDBA masterkey 1

      - name: Pin DuckDB version
        run: |
          DUCKDB_GIT_VERSION=${DUCKDB_VERSION} make set_duckdb_version

      - name: Build (release)
        env:
          GEN: ninja
        run: make release

      - name: Run SQL test suite
        env:
          ISC_USER: SYSDBA
          ISC_PASSWORD: masterkey
        run: |
          ./build/release/test/unittest test/sql/firebird_scan.test
          ./build/release/test/unittest test/sql/firebird_attach.test
          ./build/release/test/unittest test/sql/firebird_health.test
          ./build/release/test/unittest test/sql/firebird_index_profile.test
          ./build/release/test/unittest test/sql/firebird_bind_params.test
          ./build/release/test/unittest test/sql/firebird_blob_lossless.test
          ./build/release/test/unittest test/sql/firebird_dbt_sources.test
          ./build/release/test/unittest test/sql/firebird_metadata.test
          ./build/release/test/unittest test/sql/firebird_metadata_bridge.test
          ./build/release/test/unittest test/sql/firebird_observability.test
          ./build/release/test/unittest test/sql/firebird_paging.test
          ./build/release/test/unittest test/sql/firebird_pool.test
          ./build/release/test/unittest test/sql/firebird_pool_stats.test
          ./build/release/test/unittest test/sql/firebird_predicates.test
          ./build/release/test/unittest test/sql/firebird_profile_table.test
          # firebird_explain_pushdown.test and firebird_type_audit.test are
          # NOT listed here: both gate their entire file on
          # `require-env FIREBIRD_NONE_DB` (confirmed via a local run with
          # that var unset -- DuckDB's sqllogictest runner skips the WHOLE
          # file, not just the NONE-specific block), which this workflow
          # does not provision (issue #26). Adding them here would just
          # report "0 assertions, skipped" -- not real coverage. Revisit
          # once #26 lands.

      - name: FB4+ live type smoke (INT128 / DECIMAL(38) / TIMESTAMP_TZ)
        if: matrix.fb_major != '3'
        env:
          ISC_USER: SYSDBA
          ISC_PASSWORD: masterkey
          FIREBIRD_BIZ4_DB: firebird://SYSDBA:masterkey@localhost:3050/var/lib/firebird/data/biz4.fdb?charset=UTF8
        run: |
          ./build/release/duckdb -unsigned <<'EOF'
          SELECT
              typeof(BIG_NUM)  AS t_big_num,
              typeof(BIG_DEC)  AS t_big_dec,
              typeof(TS_TZ)    AS t_ts_tz,
              typeof(T_TZ)     AS t_t_tz
            FROM firebird_scan(
                'firebird://SYSDBA:masterkey@localhost:3050/var/lib/firebird/data/biz4.fdb?charset=UTF8',
                'FB4_TYPES',
                partitions=1)
           LIMIT 1;
          EOF
          ./build/release/test/unittest test/sql/firebird_type_audit_fb4.test

      - name: Stop Firebird container
        if: always()
        run: docker rm -f fb || true

      - name: Upload extension artifact (linux_amd64) - fb${{ matrix.fb_major }}
        if: matrix.fb_major == '5'
        uses: actions/upload-artifact@v7
        with:
          name: firebird.duckdb_extension-linux-x64
          path: build/release/extension/firebird/firebird.duckdb_extension
          retention-days: 30
          if-no-files-found: error
