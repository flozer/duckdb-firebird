name: Update download badge

on:
  schedule:
    - cron: '23 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-download-badge:
    name: Update firebird download badge
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update badge JSON
        run: node scripts/update_download_badge.mjs

      - name: Commit badge update
        run: |
          if git diff --quiet -- .github/badges/downloads.json; then
            echo "Download badge unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/downloads.json
          git commit -m "docs: update download badge"
          git push
