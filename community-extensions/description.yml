# Submission file for https://github.com/duckdb/community-extensions
#
# To publish this extension via `INSTALL firebird FROM community;
# LOAD firebird;`, copy this file to
#   community-extensions/extensions/firebird/description.yml
# in a fork of duckdb/community-extensions and open a pull request.
# The community-extensions CI will build + sign the extension for every
# supported platform from this repo's main branch.

extension:
  name: firebird
  description: |
    Federated read-only access to Firebird databases from DuckDB.
    Adds:
      - firebird_scan(connection_string, table_name [, ...named params])
      - firebird_tables(connection_string) — table-name + PK discovery
      - firebird_attach_sql(connection_string [, schema]) — emits the
        DDL for a view-based attach
      - ATTACH 'firebird://…' AS fb (TYPE firebird) — native catalog
        with `SELECT * FROM fb.main.TABLE` support
    Projection + filter pushdown (=, <>, <, >, <=, >=, IS NULL,
    BETWEEN, IN, AND/OR, LIKE 'prefix%'), PK-range parallel scan
    (opt-in), connection pool + metadata cache. Firebird 3/4/5
    server compatibility, including INT128, DECIMAL(38, s),
    TIMESTAMP WITH TIME ZONE, and TIME WITH TIME ZONE. Also
    supports CHARACTER SET NONE Firebird databases via a
    none_encoding=strict|win1252|iso8859_1|blob option.
  version: 0.4.0
  language: C++
  build: cmake
  license: MIT
  # libfbclient is consumed via the in-repo vcpkg.json manifest, so the
  # community CI must spin up the vcpkg toolchain to satisfy the
  # ibase.h / fbclient_ms dependency before configuring CMake.
  requires_toolchains: vcpkg
  maintainers:
    - flozer
  # Platforms where libfbclient is reachable via the build's vcpkg
  # manifest / FB_SDK_ROOT. WASM is excluded — libfbclient depends on
  # native sockets / threads / file IO.
  excluded_platforms: "wasm_mvp;wasm_threads;wasm_eh"

repo:
  github: flozer/duckdb-firebird
  # Pinned to the v0.4 release tag — community-extensions CI checks
  # out exactly this ref to build the published artefacts.
  ref: v0.4.0
