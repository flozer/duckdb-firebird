# Submission file for https://github.com/duckdb/community-extensions
#
# To publish this extension via `INSTALL firebird FROM community;
# LOAD firebird;`, copy this file to
#   community-extensions/extensions/firebird/description.yml
# in a fork of duckdb/community-extensions and open a pull request.
# The community-extensions CI will build + sign the extension for every
# supported platform from this repo's main branch.

extension:
  name: firebird
  description: Federated read-only access to Firebird (3.0/4.0/5.0) databases from DuckDB, with projection + filter pushdown, INT128 / DECIMAL(38) / TIMESTAMP_TZ support, native ATTACH, and explicit CHARACTER SET NONE handling (default win1252; strict / iso8859_1 / blob also available) with filter-pushdown correctness on transcoded columns.
  version: 0.4.4
  language: C++
  build: cmake
  license: MIT
  # libfbclient is consumed via the in-repo vcpkg.json manifest, so the
  # community CI must spin up the vcpkg toolchain to satisfy the
  # ibase.h / fbclient_ms dependency before configuring CMake.
  requires_toolchains: vcpkg
  maintainers:
    - flozer
  # Platforms where libfbclient is reachable via the build's vcpkg
  # manifest / FB_SDK_ROOT. WASM is excluded — libfbclient depends on
  # native sockets / threads / file IO.
  excluded_platforms: "wasm_mvp;wasm_threads;wasm_eh"

repo:
  github: flozer/duckdb-firebird
  # Pinned to the v0.4.4 release tag — community-extensions CI checks
  # out exactly this ref to build + sign the published artefacts.
  ref: v0.4.4
